<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 风场地球可视化</title>
    <script type="module" crossorigin src="./assets/index-Dxvm7cxc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D_CKxvmN.css">
  </head>
  <body>
    <main id="app" aria-label="3D wind globe prototype">
      <canvas id="globe-canvas"></canvas>
      <div class="hud" aria-live="polite">
        <strong>3D 风场地球可视化</strong>
        <span>V1: procedural earth + wind + satellites</span>
        <span class="wind-source" id="wind-source" data-source="loading">加载风场…</span>
        <span class="earth-map-source" id="earth-map-source" data-source="proceduralFallback">加载地球…</span>
      </div>
      <nav class="controls" aria-label="可视化控件">
        <button id="btn-pause" type="button" aria-pressed="false">暂停</button>
        <button id="btn-wind-step" type="button" title="切换到下一 ERA5 风场时刻">风场下一时刻</button>
        <button id="btn-wind-play" type="button" aria-pressed="true">风场自动播放</button>
        <button id="btn-reset" type="button">重置视角</button>
        <label class="quality">
          质量
          <select id="select-quality">
            <option value="high" selected>High</option>
            <option value="low">Low</option>
          </select>
        </label>
      </nav>
    </main>
  </body>
</html>
